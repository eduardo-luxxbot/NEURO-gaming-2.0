<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANGUE DE TITÃ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            font-family: 'Courier New', monospace;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            background: #1a1a2e;
            border: 3px solid #333;
        }

        #canvas {
            display: block;
            background: #0f0f1a;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 20px;
            font-size: 12px;
            text-shadow: 2px 2px 0 #000;
        }

        .hud-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hud-bar {
            width: 100px;
            height: 12px;
            background: #333;
            border: 1px solid #555;
            position: relative;
        }

        .hud-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .hp-fill { background: #c0392b; }
        .mp-fill { background: #2980b9; }
        .essence-fill { background: #8e44ad; }

        /* Inventário de Ossos (Estômago) */
        #bone-inventory {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
        }

        .bone-slot {
            width: 50px;
            height: 50px;
            background: #2c2c3a;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            position: relative;
            transition: all 0.2s;
        }

        .bone-slot:hover {
            border-color: #666;
            transform: scale(1.1);
        }

        .bone-slot.active {
            border-color: #e74c3c;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        .bone-slot .essence-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Diálogo das Vozes */
        #voice-dialogue {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid;
            padding: 15px;
            display: none;
            pointer-events: auto;
        }

        #voice-dialogue.fome { border-color: #2c3e50; color: #95a5a6; }
        #voice-dialogue.memoria { border-color: #27ae60; color: #2ecc71; }
        #voice-dialogue.gravidade { border-color: #8e44ad; color: #9b59b6; }

        .voice-name {
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .voice-text {
            line-height: 1.6;
            font-style: italic;
        }

        /* Tela de Corrupção */
        #corruption-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(142, 68, 173, 0) 100%);
            pointer-events: none;
            transition: all 1s;
        }

        /* Menu de Pausa */
        #pause-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #444;
            padding: 30px;
            display: none;
            pointer-events: auto;
            text-align: center;
        }

        .menu-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #e74c3c;
            text-transform: uppercase;
        }

        .menu-option {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: 1px solid #444;
            transition: all 0.2s;
        }

        .menu-option:hover {
            background: #e74c3c;
            color: #000;
        }

        /* Tutorial/Intro */
        #intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 100;
        }

        .intro-text {
            max-width: 600px;
            text-align: center;
            line-height: 2;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .intro-title {
            font-size: 48px;
            color: #c0392b;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 #000;
            letter-spacing: 10px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #c0392b;
            color: #fff;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #e74c3c;
            transform: scale(1.05);
        }

        /* Notificações */
        #notification {
            position: absolute;
            top: 50px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 3px solid #e74c3c;
            padding: 10px 15px;
            max-width: 250px;
            display: none;
            font-size: 11px;
        }

        /* Efeito de glitch */
        .glitch {
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="800" height="600"></canvas>
        
        <div id="ui-layer">
            <div id="hud">
                <div class="hud-stat">
                    <span>HP</span>
                    <div class="hud-bar">
                        <div class="hud-fill hp-fill" id="hp-bar" style="width: 100%"></div>
                    </div>
                </div>
                <div class="hud-stat">
                    <span>MP</span>
                    <div class="hud-bar">
                        <div class="hud-fill mp-fill" id="mp-bar" style="width: 100%"></div>
                    </div>
                </div>
                <div class="hud-stat">
                    <span>ESSÊNCIA</span>
                    <div class="hud-bar">
                        <div class="hud-fill essence-fill" id="essence-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="bone-inventory">
                <div class="bone-slot" id="slot-0" onclick="selectBone(0)"></div>
                <div class="bone-slot" id="slot-1" onclick="selectBone(1)"></div>
                <div class="bone-slot" id="slot-2" onclick="selectBone(2)"></div>
            </div>

            <div id="voice-dialogue">
                <div class="voice-name" id="voice-name"></div>
                <div class="voice-text" id="voice-text"></div>
            </div>

            <div id="corruption-overlay"></div>
            <div id="notification"></div>

            <div id="pause-menu">
                <div class="menu-title">PAUSA</div>
                <div class="menu-option" onclick="resumeGame()">Continuar</div>
                <div class="menu-option" onclick="showControls()">Controles</div>
            </div>
        </div>

        <div id="intro-screen">
            <div class="intro-title">SANGUE DE TITÃ</div>
            <div class="intro-text">
                <p>15 anos após a Guerra do Fraturamento.</p>
                <p>Você é um Caçador de Relíquias. Mercenário. Predador.</p>
                <p>Hoje, você roubou um Osso de Titã. E ele está <strong>acordado</strong>.</p>
                <p style="margin-top: 20px; color: #888; font-size: 12px;">WASD - Mover | E - Interagir | 1-3 - Ossos | ESPAÇO - Magia | ESC - Pausa</p>
            </div>
            <button class="start-btn" onclick="startGame()">Engolir o Osso</button>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO DO JOGO ====================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Estados do jogo
        let gameState = 'intro'; // intro, playing, paused, dialogue
        let lastTime = 0;
        
        // Jogador
        const player = {
            x: 400,
            y: 300,
            width: 24,
            height: 24,
            speed: 150,
            hp: 100,
            maxHp: 100,
            mp: 50,
            maxMp: 50,
            essence: 0, // 0-100, corrupção dos Titãs
            facing: 'down',
            moving: false,
            animation: 0
        };

        // Ossos de Titã (Inventário/Estômago)
        const bones = [
            {
                id: 'falange_niilista',
                name: 'Falange do Niilista',
                titan: 'Fome',
                magic: 'Vácuo Devorador',
                cost: 10,
                damage: '3d8',
                healPercent: 0.5,
                personality: 'niilista',
                color: '#2c3e50',
                unlocked: true,
                firstUse: true,
                dialogue: "Por que resiste ao inevitável? Abra a boca... deixe o vazio entrar. O mundo está cheio demais. Vamos esvaziá-lo juntos.",
                corruptionEffect: 'Apatia crescente, perda de prazer'
            },
            null,
            null
        ];

        let selectedBone = 0;
        let activeVoice = null;

        // Input
        const keys = {};
        const mouse = { x: 0, y: 0 };

        // Mapa - Acampamento dos Viciados
        const map = {
            width: 1600,
            height: 1200,
            objects: [
                // Tendas
                { x: 200, y: 200, w: 80, h: 60, type: 'tent', color: '#4a4a5a' },
                { x: 400, y: 150, w: 80, h: 60, type: 'tent', color: '#4a4a5a' },
                { x: 600, y: 250, w: 80, h: 60, type: 'tent', color: '#4a4a5a' },
                // Fogueiras
                { x: 350, y: 300, w: 30, h: 30, type: 'fire', color: '#e74c3c' },
                // Ossos espalhados (decorativos)
                { x: 500, y: 400, w: 20, h: 15, type: 'bone_deco', color: '#ddd' },
                { x: 550, y: 380, w: 15, h: 20, type: 'bone_deco', color: '#ddd' },
                // Barricadas
                { x: 100, y: 100, w: 20, h: 200, type: 'wall', color: '#5a4a3a' },
                { x: 100, y: 100, w: 200, h: 20, type: 'wall', color: '#5a4a3a' },
                // NPCs (posições iniciais)
                { x: 250, y: 220, w: 20, h: 20, type: 'npc', name: 'Viciado', color: '#7a6a5a', dialogue: "Você... você tem mais? Só um pedacinho... por favor..." },
                { x: 450, y: 180, w: 20, h: 20, type: 'npc', name: 'Escavador', color: '#6a5a4a', dialogue: "Atlas está perguntando por você. Ele... ele sabe o que você roubou." }
            ]
        };

        // Câmera
        const camera = {
            x: 0,
            y: 0
        };

        // ==================== SISTEMA DE ÁUDIO (Web Audio API) ====================
        const AudioManager = {
            ctx: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            playTone(freq, type, duration, volume = 0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.value = freq;
                osc.type = type;
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            playVoiceSound(personality) {
                if (!this.ctx) return;
                // Cada personalidade tem timbre diferente
                const freqs = {
                    niilista: [100, 150, 80],
                    memoria: [300, 400, 350],
                    gravidade: [200, 250, 180, 300]
                };
                const freq = freqs[personality] || [200];
                freq.forEach((f, i) => {
                    setTimeout(() => this.playTone(f, 'sine', 0.3, 0.05), i * 100);
                });
            }
        };

        // ==================== FUNÇÕES PRINCIPAIS ====================

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            gameState = 'playing';
            AudioManager.init();
            
            // Primeira voz imediatamente
            setTimeout(() => {
                triggerVoice(0);
            }, 1000);
            
            requestAnimationFrame(gameLoop);
        }

        function triggerVoice(boneIndex) {
            const bone = bones[boneIndex];
            if (!bone || !bone.unlocked) return;
            
            activeVoice = bone;
            const dialogueBox = document.getElementById('voice-dialogue');
            const nameEl = document.getElementById('voice-name');
            const textEl = document.getElementById('voice-text');
            
            dialogueBox.className = bone.personality;
            nameEl.textContent = `${bone.name} (${bone.titan})`;
            textEl.textContent = bone.firstUse ? bone.dialogue : getRandomVoiceLine(bone);
            
            dialogueBox.style.display = 'block';
            AudioManager.playVoiceSound(bone.personality);
            
            if (bone.firstUse) {
                bone.firstUse = false;
                showNotification(`Nova magia desbloqueada: ${bone.magic}`);
            }
            
            gameState = 'dialogue';
        }

        function getRandomVoiceLine(bone) {
            const lines = {
                niilista: [
                    "Ainda há tanto para esvaziar...",
                    "Sua fome é patética comparada à minha.",
                    "O silêncio está chegando. Você ouve?"
                ],
                memoria: [
                    "Lembre-se de quem você era...",
                    "Não deixe que ele apague sua luz.",
                    "Eu guardo suas memórias. Estão seguras comigo."
                ],
                gravidade: [
                    "Gira, gira, gira!",
                    "Para cima? Para baixo? Que diferença faz?",
                    "Sinta o peso das estrelas!"
                ]
            };
            const list = lines[bone.personality] || ["..."];
            return list[Math.floor(Math.random() * list.length)];
        }

        function closeDialogue() {
            document.getElementById('voice-dialogue').style.display = 'none';
            gameState = 'playing';
        }

        function selectBone(index) {
            if (index >= bones.length || !bones[index]) return;
            selectedBone = index;
            
            // Atualizar UI
            document.querySelectorAll('.bone-slot').forEach((slot, i) => {
                slot.classList.toggle('active', i === index);
            });
            
            // Mostrar osso no slot
            updateBoneSlots();
        }

        function updateBoneSlots() {
            bones.forEach((bone, i) => {
                const slot = document.getElementById(`slot-${i}`);
                if (bone && bone.unlocked) {
                    slot.innerHTML = `
                        <div class="essence-glow" style="background: ${bone.color}"></div>
                        <span style="font-size: 10px; color: ${bone.color}; z-index: 1;">${bone.titan[0]}</span>
                    `;
                    slot.style.borderColor = bone.color;
                } else {
                    slot.innerHTML = '';
                    slot.style.borderColor = '#444';
                }
            });
        }

        function useMagic() {
            const bone = bones[selectedBone];
            if (!bone || !bone.unlocked) return;
            
            if (player.mp < bone.cost) {
                showNotification("MP insuficiente!");
                return;
            }
            
            player.mp -= bone.cost;
            updateHUD();
            
            // Efeito visual baseado no osso
            createMagicEffect(bone);
            
            // Aumentar essência (corrupção)
            player.essence = Math.min(100, player.essence + 5);
            updateCorruptionVisual();
            
            // Chance de voz falar
            if (Math.random() < 0.3) {
                triggerVoice(selectedBone);
            }
            
            // Verificar conflito mental (se tiver ossos opostos)
            checkMentalConflict();
        }

        function createMagicEffect(bone) {
            // Partículas simples
            const colors = {
                niilista: '#2c3e50',
                memoria: '#27ae60',
                gravidade: '#8e44ad'
            };
            
            // Desenhar efeito temporário
            const effect = {
                x: player.x,
                y: player.y,
                radius: 0,
                maxRadius: bone.id === 'falange_niilista' ? 100 : 60,
                color: colors[bone.personality] || '#fff',
                life: 30
            };
            
            magicEffects.push(effect);
        }

        let magicEffects = [];

        function checkMentalConflict() {
            // Verificar se tem ossos opostos e HP/MP baixo
            const hasNostalgia = bones.some(b => b && b.personality === 'memoria');
            const hasNiilista = bones.some(b => b && b.personality === 'niilista');
            
            if (hasNostalgia && hasNiilista && (player.hp < 30 || player.mp < 15)) {
                if (Math.random() < 0.2) {
                    triggerMentalConflict();
                }
            }
        }

        function triggerMentalConflict() {
            showNotification("⚠️ CISMA DOS ECOS! Suas vozes estão brigando!");
            // Efeito de atordoado por 1 segundo
            gameState = 'stunned';
            setTimeout(() => {
                gameState = 'playing';
                // Forçar uso de magia aleatória
                const validBones = bones.map((b, i) => b ? i : -1).filter(i => i !== -1);
                if (validBones.length > 0) {
                    const randomBone = validBones[Math.floor(Math.random() * validBones.length)];
                    selectedBone = randomBone;
                    useMagic();
                }
            }, 1000);
        }

        function updateCorruptionVisual() {
            const overlay = document.getElementById('corruption-overlay');
            const intensity = player.essence / 100;
            
            if (intensity > 0.5) {
                overlay.style.background = `radial-gradient(circle at center, transparent 0%, rgba(142, 68, 173, ${intensity * 0.5}) 100%)`;
                document.body.classList.toggle('glitch', intensity > 0.75);
            }
            
            updateHUD();
        }

        function showNotification(text) {
            const notif = document.getElementById('notification');
            notif.textContent = text;
            notif.style.display = 'block';
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }

        function updateHUD() {
            document.getElementById('hp-bar').style.width = `${(player.hp / player.maxHp) * 100}%`;
            document.getElementById('mp-bar').style.width = `${(player.mp / player.maxMp) * 100}%`;
            document.getElementById('essence-bar').style.width = `${player.essence}%`;
        }

        // ==================== MOVIMENTAÇÃO E COLISÃO ====================

        function updatePlayer(dt) {
            if (gameState !== 'playing') return;
            
            let dx = 0;
            let dy = 0;
            
            if (keys['w'] || keys['arrowup']) dy = -1;
            if (keys['s'] || keys['arrowdown']) dy = 1;
            if (keys['a'] || keys['arrowleft']) dx = -1;
            if (keys['d'] || keys['arrowright']) dx = 1;
            
            // Normalizar diagonal
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }
            
            player.moving = dx !== 0 || dy !== 0;
            
            if (player.moving) {
                const newX = player.x + dx * player.speed * dt;
                const newY = player.y + dy * player.speed * dt;
                
                // Limites do mapa
                if (newX > 0 && newX < map.width - player.width) player.x = newX;
                if (newY > 0 && newY < map.height - player.height) player.y = newY;
                
                // Direção
                if (dy < 0) player.facing = 'up';
                else if (dy > 0) player.facing = 'down';
                else if (dx < 0) player.facing = 'left';
                else if (dx > 0) player.facing = 'right';
                
                player.animation += dt * 10;
            }
            
            // Regeneração lenta de MP
            player.mp = Math.min(player.maxMp, player.mp + dt * 2);
            updateHUD();
        }

        function checkInteractions() {
            // Verificar proximidade com NPCs
            map.objects.forEach(obj => {
                if (obj.type === 'npc') {
                    const dist = Math.hypot(player.x - obj.x, player.y - obj.y);
                    if (dist < 40 && keys['e']) {
                        showNotification(`${obj.name}: "${obj.dialogue}"`);
                        keys['e'] = false; // Evitar spam
                    }
                }
            });
        }

        // ==================== RENDERIZAÇÃO ====================

        function draw() {
            // Limpar canvas
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Atualizar câmera
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            
            // Limitar câmera
            camera.x = Math.max(0, Math.min(camera.x, map.width - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, map.height - canvas.height));
            
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            
            // Desenhar chão (grid simples)
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 1;
            for (let x = 0; x < map.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, map.height);
                ctx.stroke();
            }
            for (let y = 0; y < map.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(map.width, y);
                ctx.stroke();
            }
            
            // Desenhar objetos do mapa
            map.objects.forEach(obj => {
                ctx.fillStyle = obj.color;
                
                if (obj.type === 'tent') {
                    // Tenda triangular
                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w/2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h);
                    ctx.closePath();
                    ctx.fill();
                    // Interior escuro
                    ctx.fillStyle = '#2a2a3a';
                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w/2, obj.y + 10);
                    ctx.lineTo(obj.x + obj.w - 10, obj.y + obj.h - 5);
                    ctx.lineTo(obj.x + 10, obj.y + obj.h - 5);
                    ctx.closePath();
                    ctx.fill();
                } else if (obj.type === 'fire') {
                    // Fogueira animada
                    const flicker = Math.sin(Date.now() / 100) * 5;
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2 + flicker, 15, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#f39c12';
                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2 + flicker, 10, 0, Math.PI * 2);
                    ctx.fill();
                } else if (obj.type === 'npc') {
                    // NPC simples
                    ctx.fillStyle = obj.color;
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    // Indicador de interação
                    const dist = Math.hypot(player.x - obj.x, player.y - obj.y);
                    if (dist < 40) {
                        ctx.fillStyle = '#fff';
                        ctx.font = '12px monospace';
                        ctx.fillText('[E]', obj.x, obj.y - 5);
                    }
                } else {
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                }
            });
            
            // Efeitos de magia
            magicEffects = magicEffects.filter(effect => {
                effect.radius += (effect.maxRadius - effect.radius) * 0.1;
                effect.life--;
                
                ctx.strokeStyle = effect.color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = effect.life / 30;
                ctx.beginPath();
                ctx.arc(effect.x, effect.y, effect.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                
                return effect.life > 0;
            });
            
            // Desenhar jogador
            drawPlayer();
            
            ctx.restore();
        }

        function drawPlayer() {
            const x = player.x;
            const y = player.y;
            const w = player.width;
            const h = player.height;
            
            // Sombra
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(x + w/2, y + h - 2, w/2, h/4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Corpo (animação de caminhada)
            const bob = player.moving ? Math.sin(player.animation) * 2 : 0;
            
            // Cor base muda com essência
            const corruption = player.essence / 100;
            const r = Math.floor(100 + corruption * 100);
            const g = Math.floor(100 - corruption * 50);
            const b = Math.floor(120 + corruption * 50);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            
            ctx.fillRect(x + 4, y + 4 + bob, w - 8, h - 8);
            
            // Cabeça
            ctx.fillStyle = `rgb(${r+20},${g+20},${b+20})`;
            ctx.fillRect(x + 6, y - 4 + bob, w - 12, 8);
            
            // Olhos (brilham com essência alta)
            if (corruption > 0.5) {
                ctx.fillStyle = '#8e44ad';
                ctx.fillRect(x + 8, y - 2 + bob, 3, 3);
                ctx.fillRect(x + 13, y - 2 + bob, 3, 3);
            } else {
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 8, y - 2 + bob, 2, 2);
                ctx.fillRect(x + 14, y - 2 + bob, 2, 2);
            }
            
            // Arma/Item equipado
            if (bones[selectedBone]) {
                ctx.fillStyle = bones[selectedBone].color;
                ctx.globalAlpha = 0.6;
                ctx.fillRect(x + w, y + h/2, 8, 8);
                ctx.globalAlpha = 1;
            }
        }

        // ==================== GAME LOOP ====================

        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            if (gameState === 'playing') {
                updatePlayer(dt);
                checkInteractions();
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ==================== EVENT LISTENERS ====================

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            if (e.key === 'Escape') {
                togglePause();
            } else if (e.key === ' ') {
                if (gameState === 'dialogue') {
                    closeDialogue();
                } else if (gameState === 'playing') {
                    useMagic();
                }
            } else if (['1', '2', '3'].includes(e.key)) {
                selectBone(parseInt(e.key) - 1);
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function togglePause() {
            if (gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pause-menu').style.display = 'block';
            } else if (gameState === 'paused') {
                resumeGame();
            }
        }

        function resumeGame() {
            gameState = 'playing';
            document.getElementById('pause-menu').style.display = 'none';
        }

        function showControls() {
            alert('WASD/Setas - Mover\nE - Interagir\n1-3 - Selecionar Osso\nESPAÇO - Usar Magia\nESC - Pausar');
        }

        // Inicializar slots de ossos
        updateBoneSlots();
        selectBone(0);

    </script>
</body>
</html>
